services:
  - type: web
    name: meishi-generator
    runtime: python
    plan: free
    region: singapore
    rootDir: print-card/generator
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
