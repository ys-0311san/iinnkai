<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員カードジェネレーター — メスケモ推進委員会</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="card-style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1 class="title">メスケモ推進委員会</h1>
            <p class="subtitle">会員カードジェネレーター</p>
        </header>

        <!-- VIP解放バナー（checkVipUnlock()で表示） -->
        <div class="vip-unlock-banner" id="vipUnlockBanner" hidden>
            <span class="vip-unlock-icon">★</span>
            <span class="vip-unlock-text">VIPランクが解放されました</span>
            <a id="vipShareBtn"
               href="https://twitter.com/intent/tweet?text=vip%E8%A7%A3%E6%94%BE%E3%81%8A%E3%82%81%E3%81%A7%E3%81%A8%E3%81%86%EF%BC%81%E5%90%9B%E3%81%AF%E3%83%A1%E3%82%B9%E3%82%B1%E3%83%A2%E6%8E%A8%E9%80%B2%E5%A7%94%E5%93%A1%E4%BC%9AVIP%E3%82%92%E6%8E%88%E4%B8%8E%E3%81%99%E3%82%8B%EF%BC%81%20%23%E3%81%AA%E3%81%A7%E3%81%AA%E3%81%A7%E8%8C%B6%E5%B1%8B%20%23%E3%83%A1%E3%82%B9%E3%82%B1%E3%83%A2%E6%8E%A8%E9%80%B2%E5%A7%94%E5%93%A1%E4%BC%9A&url=https%3A%2F%2Fys-0311san.github.io%2Fiinnkai%2F"
               target="_blank"
               rel="noopener noreferrer"
               class="btn-share-x">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                ポストする
            </a>
        </div>

        <div class="generator-layout">
            <!-- 左側：入力フォーム -->
            <div class="form-section">
                <h2>会員情報入力</h2>

                <!-- 名前 -->
                <div class="form-group">
                    <label for="userName">お名前（アバター名）</label>
                    <input type="text" id="userName" placeholder="例: メスケモ太郎" maxlength="20">
                </div>

                <!-- 顔写真（カスタムアップロードUI） -->
                <div class="form-group">
                    <label>顔写真</label>
                    <label class="file-upload-area" id="fileUploadArea" for="photoUpload" role="button" tabindex="0">
                        <span class="file-upload-icon">＋</span>
                        <span class="file-upload-text">画像を選択またはドロップ</span>
                        <span class="file-upload-hint">JPG / PNG / WEBP</span>
                    </label>
                    <input type="file" id="photoUpload" accept="image/*" class="sr-only">
                </div>

                <!-- 写真プレビュー＆調整 -->
                <div class="photo-preview-container" id="photoPreviewContainer" style="display: none;">
                    <label>写真の位置・サイズ調整</label>
                    <div class="photo-preview" id="photoPreview">
                        <canvas id="photoCanvas"></canvas>
                    </div>
                    <div class="photo-controls">
                        <label for="scaleSlider">拡大縮小: <span id="scaleValue">100%</span></label>
                        <input type="range" id="scaleSlider" min="0" max="300" value="100" step="1">
                        <button type="button" class="btn-secondary" id="resetPhotoBtn">位置リセット</button>
                    </div>
                    <p class="help-text">写真をドラッグ＆ドロップで位置を調整できます</p>
                </div>

                <!-- 称号（ランダム生成） -->
                <div class="form-group">
                    <label for="userTitle">称号</label>
                    <div class="input-with-btn">
                        <input type="text" id="userTitle" placeholder="ボタンで生成 / 直接入力も可" maxlength="20">
                        <button type="button" class="btn-secondary" id="regenTitleBtn">ランダム生成</button>
                    </div>
                    <p class="help-text">ボタンを押すたびに「〇〇の✕✕」形式の称号が変わります</p>
                </div>

                <!-- 好きなメスケモ種族 -->
                <div class="form-group">
                    <label for="favoriteSpecies">好きなメスケモ種族</label>
                    <input type="text" id="favoriteSpecies" placeholder="例: 狐、狼、猫 など" maxlength="20">
                </div>

                <!-- コメント -->
                <div class="form-group">
                    <label for="userComment">コメント</label>
                    <input type="text" id="userComment" placeholder="ひとことどうぞ（30文字まで）" maxlength="30">
                </div>

                <!-- 会員番号 -->
                <div class="form-group">
                    <label>会員番号（作成日時ベース）</label>
                    <div class="input-with-btn">
                        <input type="text" id="memberId" readonly>
                        <button type="button" class="btn-secondary" id="regenMemberIdBtn">再生成</button>
                    </div>
                    <p class="help-text">フォーマット: 年月日時分（例: 2604101909 = 2026年4月10日19:09）</p>
                </div>

                <!-- 背景 -->
                <div class="form-group">
                    <label>背景</label>
                    <div class="bg-selector" id="bgSelector"></div>
                    <p class="help-text">クリックして背景を選択</p>
                </div>

                <!-- 会員ランク -->
                <div class="form-group">
                    <label for="cardType">会員ランク</label>
                    <select id="cardType">
                        <option value="regular">レギュラー会員</option>
                        <option value="cast">キャスト</option>
                        <!-- VIPはlocalStorageのフラグで自動追加 -->
                    </select>
                </div>

                <!-- 生成ボタン -->
                <button type="button" class="btn-primary" id="generateBtn">
                    カードを生成
                </button>
                <button type="button" class="btn-back" id="backBtn">
                    メインページに戻る
                </button>
            </div>

            <!-- 右側：プレビュー -->
            <div class="preview-section">
                <h2>プレビュー</h2>
                <div class="card-preview-container">
                    <canvas id="cardCanvas" width="1024" height="650"></canvas>
                </div>
                <div class="download-section" id="downloadSection" style="display: none;">
                    <button type="button" class="btn-download" id="downloadBtn">
                        カードをダウンロード
                    </button>
                    <a id="shareXBtn"
                       href="#"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="btn-share-x btn-share-x--full"
                       style="display:none;"
                       aria-label="Xでカードをポストする">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                        Xでポスト
                    </a>
                    <p id="shareXHint" class="share-x-hint" style="display:none;">
                        よかったら画像もダウンロードして添付してね！
                    </p>
                    <button type="button" class="btn-secondary" id="resetFormBtn">
                        もう一度作成
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="card-generator.js"></script>
    <footer style="text-align:center;padding:1rem;font-size:0.75rem;color:rgba(245,243,237,0.4);">
        <p>本ツールの使用に伴ういかなる損害・トラブルについても、メスケモ推進委員会は一切の責任を負いかねます。</p>
        <p>&copy; メスケモ推進委員会</p>
    </footer>
</body>
</html>
