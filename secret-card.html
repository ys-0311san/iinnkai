<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎴 メスケモ推進委員会 会員カードジェネレーター</title>
    <link rel="stylesheet" href="card-style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1 class="title">🎴 メスケモ推進委員会</h1>
            <p class="subtitle">会員カードジェネレーター</p>
            <p class="congratulations">おめでとうございます！隠しページを発見しました！</p>
        </header>

        <div class="generator-layout">
            <!-- 左側：入力フォーム -->
            <div class="form-section">
                <h2>会員情報入力</h2>

                <!-- 名前 -->
                <div class="form-group">
                    <label for="userName">お名前（アバター名）</label>
                    <input type="text" id="userName" placeholder="例: メスケモ太郎" maxlength="20">
                </div>

                <!-- 顔写真 -->
                <div class="form-group">
                    <label for="photoUpload">顔写真</label>
                    <input type="file" id="photoUpload" accept="image/*">
                    <p class="help-text">画像は自動的に最適なサイズに調整されます</p>
                </div>

                <!-- 写真プレビュー＆調整 -->
                <div class="photo-preview-container" id="photoPreviewContainer" style="display: none;">
                    <label>写真の位置・サイズ調整</label>
                    <div class="photo-preview" id="photoPreview">
                        <canvas id="photoCanvas"></canvas>
                    </div>

                    <div class="photo-controls">
                        <label for="scaleSlider">拡大縮小: <span id="scaleValue">100%</span></label>
                        <input type="range" id="scaleSlider" min="50" max="200" value="100" step="5">

                        <button type="button" class="btn-secondary" onclick="resetPhotoPosition()">位置リセット</button>
                    </div>
                    <p class="help-text">📱 写真をタップ＆ドラッグで位置を調整できます</p>
                </div>

                <!-- 推しキャスト -->
                <div class="form-group">
                    <label for="favoriteCast">推しキャスト</label>
                    <select id="favoriteCast">
                        <option value="">選択してください</option>
                        <option value="未定">まだ決めてない</option>
                        <option value="みんな推し">みんな推し！</option>
                        <option value="takaniso">takaniso</option>
                        <option value="狐乃さまあ">狐乃さまあ</option>
                        <option value="ぬの">ぬの</option>
                        <option value="Cute Nukko">Cute Nukko</option>
                        <option value="ウルフィー">ウルフィー</option>
                        <option value="うどん君">うどん君</option>
                        <option value="天塚マウル">天塚マウル</option>
                        <option value="yuki__san">yuki__san</option>
                        <option value="銀天のウェイン">銀天のウェイン</option>
                        <option value="蒼天-Souten-">蒼天-Souten-</option>
                    </select>
                </div>

                <!-- 好きなメスケモ種族 -->
                <div class="form-group">
                    <label for="favoriteSpecies">好きなメスケモ種族</label>
                    <input type="text" id="favoriteSpecies" placeholder="例: 狐、狼、猫 など" maxlength="20">
                </div>

                <!-- 会員番号 -->
                <div class="form-group">
                    <label>会員番号（作成日時ベース）</label>
                    <input type="text" id="memberId" readonly>
                    <button type="button" class="btn-secondary" onclick="generateMemberId()">再生成</button>
                    <p class="help-text">フォーマット: 年月日時分（例: 2604101909 = 2026年4月10日19:09）</p>
                </div>

                <!-- カード種類 -->
                <div class="form-group">
                    <label for="cardType">カード種類</label>
                    <select id="cardType">
                        <option value="regular">レギュラー会員（銀）</option>
                        <option value="gold">ゴールド会員（金）</option>
                        <option value="platinum">プラチナ会員（プラチナ）</option>
                        <option value="chairman">委員長カード（特別）</option>
                    </select>
                </div>

                <!-- 生成ボタン -->
                <button type="button" class="btn-primary" onclick="generateCard()">
                    カードを生成
                </button>

                <button type="button" class="btn-back" onclick="goBack()">
                    メインページに戻る
                </button>
            </div>

            <!-- 右側：プレビュー -->
            <div class="preview-section">
                <h2>プレビュー</h2>
                <div class="card-preview-container">
                    <canvas id="cardCanvas" width="1024" height="650"></canvas>
                </div>

                <div class="download-section" id="downloadSection" style="display: none;">
                    <button type="button" class="btn-download" onclick="downloadCard()">
                        📥 カードをダウンロード
                    </button>
                    <button type="button" class="btn-secondary" onclick="resetForm()">
                        もう一度作成
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="card-generator.js"></script>
</body>
</html>
